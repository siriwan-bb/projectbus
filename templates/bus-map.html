<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบกำหนดจุดที่นั่ง (Admin Seat Setup)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 20px; }
        .setup-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        #workspace-container { position: relative; display: inline-block; border: 2px dashed #bdc3c7; background-color: #eee; min-width: 300px; min-height: 200px; margin-top: 20px; }
        #bus-image { display: block; max-width: 100%; pointer-events: none; }
        .seat-marker { position: absolute; width: 35px; height: 35px; background-color: #28a745; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid white; transform: translate(-50%, -50%); z-index: 100; }
        .seat-marker:hover { transform: translate(-50%, -50%) scale(1.1); background-color: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <div class="setup-container">
            <h3 class="mb-3">🔧 ระบบตั้งค่าผังที่นั่ง</h3>
            <input type="file" class="form-control mb-3" id="imageLoader" accept="image/*" style="max-width: 400px; margin: 0 auto;">
            <button class="btn btn-primary" onclick="saveLayout()">💾 บันทึก Layout</button>
            <button class="btn btn-secondary" onclick="location.reload()">🔄 รีเซ็ต</button>
        </div>

        <div class="text-center">
            <div id="workspace-container">
                <img id="bus-image" src="" alt="">
                <div id="placeholder-text" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888;">
                    กรุณาอัปโหลดรูปภาพรถบัส
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const workspace = document.getElementById('workspace-container');
        const busImage = document.getElementById('bus-image');
        const placeholder = document.getElementById('placeholder-text');
        let seatsData = [];

        imageLoader.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                busImage.src = event.target.result;
                busImage.onload = function() {
                    workspace.style.width = 'fit-content';
                    placeholder.style.display = 'none';
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        workspace.addEventListener('click', function(e) {
            if(!busImage.src || busImage.src.includes(window.location.href)) {
                alert("กรุณาอัปโหลดรูปภาพก่อนครับ"); return;
            }
            if(e.target.classList.contains('seat-marker')) return;

            const rect = workspace.getBoundingClientRect();
            const xPercent = ((e.clientX - rect.left) / workspace.offsetWidth) * 100;
            const yPercent = ((e.clientY - rect.top) / workspace.offsetHeight) * 100;
            const seatName = prompt("ตั้งชื่อที่นั่ง (เช่น A1):");

            if (seatName) {
                createMarker(xPercent, yPercent, seatName);
                seatsData.push({ id: seatName, top: yPercent.toFixed(2), left: xPercent.toFixed(2) });
            }
        });

        function createMarker(x, y, name) {
            const marker = document.createElement('div');
            marker.classList.add('seat-marker');
            marker.style.left = x + '%';
            marker.style.top = y + '%';
            marker.innerText = name;
            marker.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                if(confirm('ลบที่นั่ง ' + name + ' ใช่ไหม?')) {
                    marker.remove();
                    seatsData = seatsData.filter(seat => seat.id !== name);
                }
            });
            workspace.appendChild(marker);
        }

        function saveLayout() {
            if(seatsData.length === 0) { alert("ยังไม่ได้กำหนดจุดเลยครับ"); return; }
            fetch('/api/save-seats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(seatsData)
            })
            .then(res => res.json())
            .then(data => alert("✅ บันทึกเรียบร้อย!"))
            .catch(err => alert("❌ Error: " + err));
        }
    </script>
</body>
</html>
