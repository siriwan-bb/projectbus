<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยันตัวตนเจ้าหน้าที่ - Smart Bus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #212529; /* พื้นหลังสีเข้ม */
            font-family: 'Prompt', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ปรับแต่ง Navbar ให้ลอยอยู่ด้านบน */
        .navbar {
            background: rgba(0,0,0,0.5); /* พื้นหลังดำจางๆ */
            backdrop-filter: blur(5px);
        }
        .nav-link { color: rgba(255,255,255,0.8) !important; margin-left: 15px; }
        .nav-link:hover { color: #ffc107 !important; }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .icon-box {
            width: 80px; height: 80px;
            background: #ffc107;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 2rem; color: #333;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-white" href="/"><i class="fas fa-bus-alt"></i> SNN Bus</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="/">หน้าหลัก</a></li>
                    <li class="nav-item"><a class="nav-link" href="/check_booking">ตรวจสอบการจอง</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">เข้าสู่ระบบ</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="login-card">
        <div class="icon-box">
            <i class="fas fa-user-shield"></i>
        </div>
        <h3 class="fw-bold mb-1">ส่วนเจ้าหน้าที่</h3>
        <p class="text-muted mb-4">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</p>

        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold small">รหัสผ่าน (Admin Password)</label>
                <input type="password" name="password" class="form-control form-control-lg text-center" placeholder="****" required autofocus>
            </div>
            
            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">ยืนยัน</button>
            <a href="/" class="btn btn-link text-muted mt-2 w-100 text-decoration-none small">กลับหน้าหลัก</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
