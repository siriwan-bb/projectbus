<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Smart Bus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa; /* พื้นหลังสีเทาอ่อน */
            font-family: 'Prompt', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px;
            padding-top: 10px;
        }

        /* ส่วน Tab ด้านบน */
        .nav-tabs {
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .nav-link {
            border: none;
            color: #aaa;
            font-weight: 500;
            padding: 15px 0;
            width: 50%; /* แบ่งครึ่ง */
            text-align: center;
            font-size: 1.1rem;
        }
        .nav-link.active {
            color: #0d6efd; /* สีน้ำเงิน */
            border-bottom: 3px solid #0d6efd;
            background: transparent;
        }
        .nav-link:hover {
            border-color: transparent;
            color: #0d6efd;
        }

        /* ตัวเลือก Radio (User vs Phone) */
        .login-type {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .type-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #555;
        }
        .type-item i {
            margin-right: 8px;
        }
        .text-active {
            color: #000;
            font-weight: bold;
        }
        .icon-check { color: #2ecc71; } /* สีเขียว */
        .icon-circle { color: #ddd; }   /* สีเทา */

        /* ช่องกรอกข้อมูล (Input) */
        .input-group-custom {
            background-color: #f3f4f6; /* สีม่วงอ่อนๆ ตามรูป */
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 15px;
        }
        .input-group-custom i {
            color: #666;
            margin-right: 15px;
            font-size: 1.2rem;
        }
        .input-group-custom input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            color: #333;
        }
        .eye-icon {
            cursor: pointer;
            color: #999;
        }

        /* ปุ่มเข้าสู่ระบบ */
        .btn-login {
            background-color: #ff5722; /* สีส้ม */
            color: white;
            border: none;
            border-radius: 50px;
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #e64a19;
            color: white;
        }

        .forgot-link {
            display: block;
            text-align: center;
            color: #0d6efd;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <ul class="nav nav-tabs">
            <li class="nav-item w-50">
                <a class="nav-link active" href="#">เข้าสู่ระบบ</a>
            </li>
            <li class="nav-item w-50">
                <a class="nav-link" href="#">สมัครสมาชิก</a>
            </li>
        </ul>

        <div class="login-type">
            <div class="type-item text-active">
                <i class="fas fa-check-circle icon-check"></i> ยูสเซอร์ไอดี / อีเมล
            </div>
            <div class="type-item">
                <i class="fas fa-check-circle icon-circle"></i> โทรศัพท์
            </div>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group-custom">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="ยูสเซอร์ไอดี / อีเมล" required>
            </div>

            <div class="input-group-custom">
                <i class="fas fa-key"></i>
                <input type="password" id="password" placeholder="รหัสผ่าน" required>
                <i class="fas fa-eye-slash eye-icon" onclick="togglePassword()"></i>
            </div>

            <a href="#" class="forgot-link">ลืมรหัสผ่าน?</a>

            <button type="submit" class="btn btn-login">เข้าสู่ระบบ</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">กลับหน้าหลัก</a>
        </div>
    </div>

    <script>
        // ฟังก์ชันสลับดูรหัสผ่าน
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        // ฟังก์ชันกดปุ่ม Login
        function handleLogin(e) {
            e.preventDefault(); // กันไม่ให้หน้าเว็บรีโหลด
            
            // จำลองการเข้าสู่ระบบ
            const user = document.getElementById('username').value;
            alert('ยินดีต้อนรับคุณ ' + user + '\nเข้าสู่ระบบสำเร็จ!');
            
            // 👇 เปลี่ยนให้กลับไปหน้าแรก (ไม่ใช่หน้า Staff)
            window.location.href = '/'; 
        }
    </script>
    <script>
    function togglePassword() {
        const passInput = document.getElementById('password');
        const icon = document.querySelector('.eye-icon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            passInput.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    }

    function handleLogin(e) {
        e.preventDefault(); 
        const user = document.getElementById('username').value;
        
        // จำลองการตรวจสอบ (Admin หรือ User ทั่วไป)
        if(user) {
            alert('เข้าสู่ระบบสำเร็จ! ยินดีต้อนรับ ' + user);
            
            // ✅ บันทึกสถานะว่า "ล็อกอินแล้ว" ลงใน Browser
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('username', user);

            // เด้งกลับหน้าหลัก
            window.location.href = '/'; 
        } else {
            alert('กรุณากรอกชื่อผู้ใช้');
        }
    }
</script>
</body>
</html>
